name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-web:
    name: Build Web
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: hinata-web
          path: build/web

  docker:
    name: Publish Web Docker image
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Bake the production backend URL into the static web build.
          build-args: |
            HINATA_DEFAULT_SERVER=https://api.track.asta.hn
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Redeploy asta (ASTASRV01)
    needs: docker
    # Only on a real push to main — never on tags or PRs (the self-hosted runner
    # has the host docker socket, so it must not run untrusted/fork code).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, astasrv01]
    steps:
      - name: Surgical redeploy of hinata-app (web)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull the freshly-built web image and recreate ONLY the app container
          # (--no-deps leaves the server + databases untouched). The asta stack
          # lives at /opt/stacks/hinata on ASTASRV01 (all values inline, no .env).
          # NB: this is the asta web image (baked api.track.asta.hn); the bear
          # instance uses the :bear image and stays a manual deploy.
          docker run --rm \
            -e GHCR_USER -e GHCR_TOKEN \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /opt/stacks/hinata:/work -w /work \
            docker:cli sh -euc '
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
              docker compose -p hinata pull hinata-app
              docker compose -p hinata up -d --no-deps --force-recreate hinata-app
              docker logout ghcr.io'
