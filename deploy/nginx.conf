server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Reverse proxy (cloud.asta.hn) terminates TLS and forwards plain HTTP here.
    server_tokens off;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm font/ttf font/woff font/woff2;

    # --- Deep-link association files (Option B) ---------------------------------
    # Apple requires apple-app-site-association served as application/json, at the
    # exact path, with no redirect and no file extension. assetlinks.json the same.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # --- Never cache the app shell / updater (so redeploys are picked up) -------
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache";
    }
    location = /version.json {
        add_header Cache-Control "no-cache";
    }

    # --- Long-cache the immutable build assets ---------------------------------
    # Note: .mjs (the WasmGC loader main.dart.mjs) MUST be here — otherwise it
    # falls through to the SPA fallback and is served as text/html, which breaks
    # the wasm bootstrap. The self-contained types block guarantees the right
    # Content-Type for the wasm bundle regardless of the base image's mime.types.
    location ~* \.(js|mjs|css|wasm|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|otf)$ {
        types {
            text/javascript        js mjs;
            application/wasm        wasm;
            text/css               css;
            image/png              png;
            image/jpeg             jpg jpeg;
            image/gif              gif;
            image/svg+xml          svg;
            image/x-icon           ico;
            font/woff              woff;
            font/woff2             woff2;
            font/ttf               ttf;
            font/otf               otf;
        }
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- SPA routing: every other path falls back to the app shell -------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
