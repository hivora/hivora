  <!-- ===== Hinata animierter Splash (nativ: SVG + CSS, kein Flutter nötig) ===== -->
  <style id="splash-screen-style">
    @font-face {
      font-family: 'Sora';
      src: url('fonts/Sora-Variable.ttf') format('truetype-variations');
      font-weight: 100 900;
      font-display: swap;
    }

    html { height: 100%; }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #F4F3EF;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background-color: #F4F3EF;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }

    #splash .inner {
      display: grid;
      justify-items: center;
      gap: 6vmin;
    }

    #splash svg {
      width: clamp(96px, 30vmin, 240px);
      height: auto;
      overflow: visible;
    }

    #splash .markg {
      transform-box: fill-box;
      transform-origin: center;
      transform: scale(0.94);
    }

    #splash path {
      stroke: #D9A032;
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
    }

    #splash .wordmark {
      font-family: 'Sora', system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(28px, 9.5vmin, 76px);
      letter-spacing: -0.03em;
      color: #23223F;
      opacity: 0;
      transform: translateY(12%);
    }

    #splash .hex {
      animation: hv-draw 0.62s cubic-bezier(0.66, 0, 0.18, 1) 0.1s forwards;
    }
    #splash .bar {
      animation: hv-draw 0.38s cubic-bezier(0.4, 0, 0.18, 1) 0.5s forwards;
    }
    #splash .markg {
      animation: hv-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.62s forwards;
    }
    #splash .wordmark {
      animation: hv-rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.88s forwards;
    }

    @keyframes hv-draw { to { stroke-dashoffset: 0; } }
    @keyframes hv-pop { from { transform: scale(0.94); } to { transform: scale(1); } }
    @keyframes hv-rise {
      from { opacity: 0; transform: translateY(12%); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      #splash path { stroke-dashoffset: 0; animation: none; }
      #splash .markg { transform: scale(1); animation: none; }
      #splash .wordmark { opacity: 1; transform: none; animation: none; }
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #131119; }
      #splash { background-color: #131119; }
      #splash path { stroke: #D9A032; }
      #splash .wordmark { color: #ECEBF3; }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      var splash = document.getElementById("splash");
      if (splash) {
        splash.style.opacity = "0";
        setTimeout(function () { splash.remove(); }, 400);
      }
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
    // Flutter feuert dieses Event nach dem ersten gerenderten Frame.
    globalThis.addEventListener("flutter-first-frame", removeSplashFromWeb);
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="inner">
      <svg viewBox="0 0 120 120" fill="none">
        <g class="markg">
          <path class="hex" pathLength="1" d="M60 14 99.8 37v46L60 106 20.2 83V37Z"></path>
          <path class="bar" pathLength="1" d="M20.2 60h79.6"></path>
        </g>
      </svg>
      <div class="wordmark">hinata</div>
    </div>
  </div>
