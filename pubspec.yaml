name: hinata
description: "Hinata - open source, self-hosted project management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Clean (path-based) URLs for Flutter web (no /#/ in the address bar)
  flutter_web_plugins:
    sdk: flutter

  # State management (Bloc family)
  bloc: ^9.1.0
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^10.1.0
  bloc_concurrency: ^0.3.0
  replay_bloc: ^0.3.0
  equatable: ^2.0.7

  # Routing
  go_router: ^16.0.0

  # Networking & storage
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Internationalization (i18next)
  i18next: ^0.9.0
  intl: any

  # UX
  animations: ^2.0.11
  wolt_modal_sheet: ^0.11.0
  fl_chart: ^1.1.1

  # Liquid Glass UI (vendored source under packages/ — full control, MIT)
  liquid_glass_widgets:
    path: packages/liquid_glass_widgets

  # Reporting / export
  pdf: ^3.11.0
  printing: ^5.13.0
  flutter_svg: ^2.0.10

  # QR matrix generation for 2FA enrolment (pure-Dart; painted via CustomPainter)
  qr: ^3.0.0

  # Platform integration
  url_launcher: ^6.3.0
  app_links: ^6.3.0
  package_info_plus: ^9.0.0

  # Attachments: native file picker + desktop drag-and-drop + photo/video gallery
  # & camera capture (image_picker drives the gallery/camera source on mobile).
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  desktop_drop: ^0.5.0
  cross_file: ^0.3.4+2

  cupertino_icons: ^1.0.8

  # Icons — Lucide (lucide.dev). Frontend convention: use ONLY these icons,
  # never Material (Icons.*) or Cupertino (CupertinoIcons.*).
  lucide_icons_flutter: ^3.1.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/en/
    - assets/i18n/de/
    - assets/branding/
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Variable.ttf
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500

# --- Generated native splash (run: dart run flutter_native_splash:create) ---
# Web + iOS splash come from the animated handoff (Design/handoff) — keep both false,
# otherwise the generator overwrites web/index.html and the iOS storyboard.
flutter_native_splash:
  color: "#F4F3EF"
  color_dark: "#131119"
  image: assets/branding/splash_icon.png
  image_dark: assets/branding/splash_icon_dark.png
  android_12:
    color: "#F4F3EF"
    color_dark: "#131119"
    image: assets/branding/splash_icon.png
    image_dark: assets/branding/splash_icon_dark.png
  web: false
  ios: false

# --- Generated app icons (run: dart run flutter_launcher_icons) ---
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  macos:
    generate: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#F4F3EF"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  adaptive_icon_monochrome: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true
